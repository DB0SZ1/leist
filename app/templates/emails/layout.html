<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--[if mso]>
    <style>
        body, table, td, p, h1, h2, h3, a {font-family: Arial, sans-serif !important;}
    </style>
    <![endif]-->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap');
        
        body, table, td, p, h1, h2, h3, a {
            font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fafbfa;
            -webkit-font-smoothing: antialiased;
            color: #1e1e1e;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #fafbfa;
            padding: 40px 0;
        }
        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 500px;
            border-spacing: 0;
            border: 1px solid rgba(42,84,38,0.08);
            border-radius: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.02);
            overflow: hidden;
        }
        .header {
            padding: 32px 32px 16px 32px;
            text-align: center;
        }
        .logo-icon {
            display: inline-flex;
            width: 28px;
            height: 28px;
            background: #2a5426;
            border-radius: 8px;
            vertical-align: middle;
            margin-right: 8px;
            align-items: center;
            justify-content: center;
        }
        .logo-text {
            display: inline-block;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #1b3818;
            vertical-align: middle;
            margin: 0;
        }
        .content {
            padding: 16px 32px 32px 32px;
            font-size: 15px;
            line-height: 1.6;
            color: #475467;
        }
        h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1a1a1a;
            margin: 0 0 16px 0;
            letter-spacing: -0.02em;
        }
        p {
            margin: 0 0 20px 0;
        }
        .btn-wrap {
            text-align: center;
            margin: 32px 0 16px 0;
        }
        .btn {
            display: inline-block;
            background-color: #2a5426;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            letter-spacing: 0.01em;
        }
        .footer {
            text-align: center;
            padding: 24px 32px;
            font-size: 12px;
            color: #8899a6;
            background-color: #fafbfc;
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        .footer a {
            color: #2a5426;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <center class="wrapper">
        <table class="main" width="100%">
            <!-- Header -->
            <tr>
                <td class="header">
                    <table width="100%" style="border-spacing:0;">
                        <tr>
                            <td align="center" style="padding-bottom:12px;">
                                <!-- App Logo -->
                                <table style="display:inline-block; border-spacing:0;" align="center">
                                    <tr>
                                        <td style="background-color:#2a5426; width:28px; height:28px; border-radius:6px; text-align:center; vertical-align:middle;">
                                            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="display:inline-block;vertical-align:middle;"><rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95"/><rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".65"/><rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".65"/><rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".3"/></svg>
                                        </td>
                                        <td style="padding-left:10px; vertical-align:middle;">
                                            <h2 class="logo-text" style="margin:0; font-size:20px; font-weight:800; letter-spacing:-0.02em; color:#1b3818; display:inline-block; font-family:'Bricolage Grotesque', sans-serif;">List<span style="opacity:0.6;">Intel</span></h2>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>

            <!-- Body -->
            <tr>
                <td class="content">
                    {% block body %}{% endblock %}
                </td>
            </tr>

            <!-- Footer -->
            <tr>
                <td class="footer">
                    <p style="margin:0 0 8px 0;">© 2026 List Intel. All rights reserved.</p>
                    <p style="margin:0;">
                        <a href="#">Privacy Policy</a> • 
                        <a href="#">Support</a>
                    </p>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
