{% extends "base.html" %}
{% block title %}Log In - List Intel{% endblock %}
{% block content %}
<div class="auth-wrap" x-data="loginForm">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:20px;">
        <div class="lmark-sm"><svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95" />
            <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".65" />
            <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".65" />
            <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".3" />
          </svg></div>
        <span class="lname-sm">List<span>Intel</span></span>
      </div>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to your account</div>
    <form @submit.prevent="submit">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="you@company.com" x-model="email" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" placeholder="••••••••" x-model="password" required />
      </div>
      <div style="text-align:right;margin:-8px 0 16px;"><a href="/forgot-password"
          style="font-size:11px;color:var(--accent);font-weight:700;text-decoration:none;">Forgot password?</a></div>
      <button class="btn-primary" type="submit" style="width:100%;justify-content:center;padding:11px;"
        :disabled="submitting">
        <span x-show="!submitting">Log in</span>
        <span x-show="submitting">Logging in...</span>
      </button>
    </form>
    <div class="auth-divider">or</div>
    <div style="text-align:center;font-size:12px;color:var(--muted);">Don't have an account? <a href="/signup"
        style="color:var(--accent);font-weight:700;cursor:pointer;text-decoration:none;">Sign up free</a></div>
  </div>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('loginForm', () => ({
      email: '',
      password: '',
      submitting: false,

      async submit() {
        this.submitting = true;
        try {
          // FastAPI OAuth2PasswordRequestForm expects form-urlencoded
          const formData = new URLSearchParams();
          formData.append('username', this.email);
          formData.append('password', this.password);

          const res = await apiFetch('/api/v1/auth/login', {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
          });
          if (res && res.access_token) {
            localStorage.setItem('access_token', res.access_token);
            window.location.href = '/dashboard';
          }
        } catch (err) {
          // Error handled by apiFetch toast
        } finally {
          this.submitting = false;
        }
      }
    }));
  });
</script>
{% endblock %}
