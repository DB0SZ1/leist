{% extends "base.html" %}
{% block title %}Forgot Password - List Intel{% endblock %}
{% block content %}
<div class="auth-wrap" x-data="forgotForm">
  <div class="auth-card">
    <div class="logo-row">
      <div class="lmark"><svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95" />
        </svg></div>
      <span class="lname">List<span>Intel</span></span>
    </div>
    <div
      style="width:44px;height:44px;border-radius:12px;background:rgba(42,84,38,.09);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 2a5 5 0 015 5v2H7V7a5 5 0 015-5z" stroke="#2a5426" stroke-width="1.8" />
        <rect x="4" y="9" width="16" height="12" rx="2" stroke="#2a5426" stroke-width="1.8" />
        <circle cx="12" cy="15" r="1.5" fill="#2a5426" />
      </svg>
    </div>

    <div x-show="!success">
      <div class="auth-title">Forgot password?</div>
      <div class="auth-sub">No worries. Enter your email and we'll send a reset link. It expires in 1 hour.</div>
      <form @submit.prevent="submit">
        <div class="fg">
          <label class="fl">Email address</label>
          <input class="fi" type="email" placeholder="you@company.com" x-model="email" required />
        </div>
        <button class="btn-p" type="submit" :disabled="submitting">
          <span x-show="!submitting">Send reset link</span>
          <span x-show="submitting">Sending...</span>
        </button>
      </form>
    </div>

    <div x-show="success" style="text-align:center; display:none;">
      <div
        style="width:44px;height:44px;border-radius:50%;background:#d4eecf;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L19 7" stroke="#1b6015" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div style="font-size:15px;font-weight:800;margin-bottom:6px;">Check your email</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:18px;">We've sent a password reset link to <span
          x-text="email" style="font-weight:700;"></span>.</div>
      <button class="btn-p" @click="success = false; email = ''">Send another link</button>
    </div>

    <a href="/login" class="btn-g"
      style="text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;">← Back to
      login</a>
  </div>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('forgotForm', () => ({
      email: '',
      submitting: false,
      success: false,

      async submit() {
        this.submitting = true;
        try {
          const res = await apiFetch('/api/v1/auth/forgot-password', {
            method: 'POST',
            body: JSON.stringify({ email: this.email })
          });
          if (res) {
            window.location.href = '/reset-password?email=' + encodeURIComponent(this.email);
          }
        } catch (err) {
        } finally {
          this.submitting = false;
        }
      }
    }));
  });
</script>
{% endblock %}
