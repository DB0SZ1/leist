{% extends "base.html" %}
{% block title %}Reset Password - List Intel{% endblock %}
{% block content %}
<div class="auth-wrap" x-data="resetForm">
  <div style="display:flex;flex-direction:column;gap:20px;width:100%;max-width:390px;">

    <!-- State 1: set new password -->
    <div class="auth-card" x-show="state === 'form'">
      <div class="logo-row">
        <div class="lmark"><svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95" />
          </svg></div><span class="lname">List<span>Intel</span></span>
      </div>
      <div class="auth-title">Reset password</div>
      <div class="auth-sub" style="margin-bottom:12px;">We sent a 6-digit code to <b style="color:var(--text)" x-text="email"></b>.</div>
      <form @submit.prevent="submit">
        <div class="fg" style="margin-bottom:24px;">
            <label class="fl" style="text-align:center;">Enter 6-digit Reset Code</label>
            <div style="display:flex; gap:8px; justify-content:center;">
                <template x-for="(digit, index) in code" :key="index">
                <input type="text" maxlength="1" 
                        class="fi" style="width:45px;height:52px;text-align:center;font-size:20px;font-weight:700;padding:0;letter-spacing:0;"
                        x-model="code[index]" 
                        @keyup="handleKeyup($event, index)" 
                        @paste="handlePaste($event)"
                        :id="'otp-' + index" required>
                </template>
            </div>
        </div>
        <div class="fg">
          <label class="fl">New password</label>
          <input class="fi" type="password" placeholder="Min 8 characters" x-model="password" @input="checkStrength"
            required />
          <div class="pw-strength">
            <div class="pw-bars">
              <div class="pw-bar" id="c1" :class="score >= 1 ? classes[score-1] : ''"></div>
              <div class="pw-bar" id="c2" :class="score >= 2 ? classes[score-1] : ''"></div>
              <div class="pw-bar" id="c3" :class="score >= 3 ? classes[score-1] : ''"></div>
              <div class="pw-bar" id="c4" :class="score >= 4 ? classes[score-1] : ''"></div>
            </div>
          </div>
        </div>
        <div class="fg">
          <label class="fl">Confirm new password</label>
          <input class="fi" type="password" placeholder="Repeat password" x-model="confirm_password" required />
        </div>
        <button class="btn-p" type="submit" :disabled="submitting || score < 3 || password !== confirm_password || !isValid">
          <span x-show="!submitting">Reset password</span>
          <span x-show="submitting">Saving...</span>
        </button>
      </form>
    </div>

    <!-- State 2: success -->
    <div class="auth-card" x-show="state === 'success'" style="text-align:center; display:none;">
      <div
        style="width:56px;height:56px;border-radius:50%;background:#d4eecf;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M5 12l5 5L19 7" stroke="#1b6015" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div style="font-size:15px;font-weight:800;margin-bottom:6px;">Password reset!</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;">Your password has been updated. You can now log
        in using your new credentials.</div>
      <a href="/login" class="btn-p" style="text-decoration:none;justify-content:center;">Go to login</a>
    </div>

  </div>
</div>

<script>
  document.addEventListener('alpine:init', () => {
    Alpine.data('resetForm', () => ({
      email: new URLSearchParams(window.location.search).get('email') || '',
      code: ['', '', '', '', '', ''],
      password: '',
      confirm_password: '',
      submitting: false,
      state: 'form',
      score: 0,
      classes: ['weak', 'fair', 'good', 'strong'],

      init() {
        if (!this.email) {
          this.email = prompt("Please enter your email:") || 'user@example.com';
        }
        this.$nextTick(() => {
            const first = document.getElementById('otp-0');
            if (first) first.focus();
        });
      },

      handleKeyup(e, index) {
        if (e.key === 'Backspace') {
          if (!this.code[index] && index > 0) {
            document.getElementById('otp-' + (index - 1)).focus();
          }
        } else if (e.key.length === 1 && /[0-9]/.test(e.key)) {
          if (index < 5) {
            document.getElementById('otp-' + (index + 1)).focus();
          }
        }
      },
      handlePaste(e) {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        for(let i = 0; i < pasted.length; i++){
            this.code[i] = pasted[i];
        }
        const focusIdx = Math.min(pasted.length, 5);
        document.getElementById('otp-' + focusIdx)?.focus();
      },
      get isValid() { return this.code.join('').length === 6; },

      checkStrength() {
        const val = this.password;
        const met = [
          val.length >= 8,
          /[A-Z]/.test(val),
          /[0-9]/.test(val),
          /[^a-zA-Z0-9]/.test(val)
        ].filter(Boolean).length;
        this.score = met;
      },

      async submit() {
        if (!this.isValid) return;
        if (this.password !== this.confirm_password) {
          window.$toast && window.$toast.show('error', 'Error', 'Passwords do not match');
          return;
        }
        if (this.score < 3) return;
        
        this.submitting = true;
        try {
          const submittedCode = this.code.join('');
          const res = await apiFetch('/api/v1/auth/reset-password', {
            method: 'POST',
            body: JSON.stringify({ email: this.email, code: submittedCode, new_password: this.password })
          });
          if (res) {
            this.state = 'success';
          }
        } catch (err) {
        } finally {
          this.submitting = false;
        }
      }
    }));
  });
</script>
{% endblock %}
