{% extends "base.html" %}

{% block content %}
<div class="topbar" style="border-bottom:1px solid var(--border);"><div style="display:flex;align-items:center;gap:8px;"><div class="logo-sm"><div class="lmark-sm"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95"/><rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".65"/><rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".65"/><rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".3"/></svg></div><span class="lname-sm">List<span>Intel</span></span></div></div></div>
<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:calc(100vh - 56px);background:var(--bg);padding:24px;text-align:center;">
    <div style="width:80px;height:80px;border-radius:24px;background:#fde3c0;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M12 2a5 5 0 015 5v2H7V7a5 5 0 015-5z" stroke="#964800" stroke-width="1.8"/><rect x="4" y="9" width="16" height="12" rx="2" stroke="#964800" stroke-width="1.8"/></svg>
    </div>
    <div style="font-size:32px;font-weight:800;color:#964800;letter-spacing:-.02em;margin-bottom:16px;">Plan required</div>
    <div style="font-size:16px;color:var(--muted);max-width:400px;margin-bottom:32px;line-height:1.5;">This feature requires the Growth plan or above. Upgrade to access the Marketplace, bounce history, and more.</div>
    <button class="btn-primary" style="background:#f59e0b;border:none;padding:12px 24px;font-size:14px;" onclick="window.location.href='/billing'">Upgrade plan →</button>
</div>
{% endblock %}
