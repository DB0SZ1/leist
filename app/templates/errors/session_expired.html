{% extends "base.html" %}

{% block content %}
<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:var(--bg);padding:24px;text-align:center;">
    <div style="width:80px;height:80px;border-radius:24px;background:#d6e8fc;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#1a4c9a" stroke-width="1.8"/><path d="M12 7v5l3 3" stroke="#1a4c9a" stroke-width="1.8" stroke-linecap="round"/></svg>
    </div>
    <div style="font-size:32px;font-weight:800;color:#1a4c9a;letter-spacing:-.02em;margin-bottom:16px;">Session expired</div>
    <div style="font-size:16px;color:var(--muted);max-width:400px;margin-bottom:32px;line-height:1.5;">Your session timed out for security. Log in again to continue where you left off.</div>
    <a href="/login" class="btn-primary" style="background:#1a4c9a;border:none;padding:12px 24px;font-size:14px;text-decoration:none;">Log in again →</a>
</div>
{% endblock %}
